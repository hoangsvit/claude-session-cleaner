name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - "1.22"
          - "1.23"
          - "1.24"
        exclude:
          # Go 1.22 test binaries can abort on macos-latest runners with
          # "missing LC_UUID load command" from dyld. Keep minimum-version
          # coverage on an older macOS image and run newer Go on latest macOS.
          - os: macos-latest
            go: "1.22"
        include:
          - os: macos-13
            go: "1.22"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Smoke test
        run: go run . --version
