name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.go }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      # macOS 15's dyld rejects Go 1.22's internally linked test binaries
      # because they can miss LC_UUID. Use the external linker on macOS so
      # test and go-run binaries include the load command dyld expects.
      GOFLAGS: ${{ runner.os == 'macOS' && '-ldflags=-linkmode=external' || '' }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        go:
          - "1.22"
          - "1.23"
          - "1.24"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Smoke test
        run: go run . --version
