name: Generate Demo GIFs

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - demo/*.tape
      - demo/seed.js
  pull_request:
    paths:
      - "*.go"
      - demo/*.tape
      - demo/seed.js
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate:
    name: Render GIFs with VHS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Cache VHS binary
        id: cache-vhs
        uses: actions/cache@v4
        with:
          path: ~/go/bin/vhs
          key: ${{ runner.os }}-vhs-v0.9.0

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        if: steps.cache-vhs.outputs.cache-hit != 'true'
        run: go install github.com/charmbracelet/vhs@v0.9.0

      - name: Download app dependencies
        run: go mod tidy

      - name: Build binary
        run: go build -o claude-cleaner .

      - name: Seed demo data
        run: node demo/seed.js /tmp/claude-demo

      - name: Make mock binaries executable
        run: chmod +x demo/mock-bin/*

      - name: Generate GIFs
        env:
          COLORTERM: truecolor
          TERM: xterm-256color
        run: |
          vhs demo/help.tape
          vhs demo/full.tape
          vhs demo/cancel.tape
          vhs demo/update.tape
          vhs demo/features.tape

      # On PRs: upload as artifact for preview — cannot commit to fork branches
      - name: Upload GIFs as artifact (PR preview)
        id: upload-gifs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: demo-gifs
          path: demo/*.gif
          retention-days: 7

      - name: Publish GIFs for inline PR preview
        id: publish-gifs
        if: github.event_name == 'pull_request'
        run: |
          set_output() {
            local name="$1"
            local value="$2"
            local delimiter="vhs_${name}_$(date +%s%N)"

            {
              printf '%s<<%s\n' "$name" "$delimiter"
              printf '%s\n' "$value"
              printf '%s\n' "$delimiter"
            } >> "$GITHUB_OUTPUT"
          }

          publish_markdown() {
            local file="$1"
            local output
            local markdown
            local url

            if ! output="$(vhs publish "$file" 2>&1)"; then
              printf '%s\n' "$output"
              return 1
            fi

            markdown="$(printf '%s\n' "$output" | sed -n 's/^[[:space:]]*//; /^!\[.*\](https:\/\/vhs\.charm\.sh\/.*\.gif)$/p' | head -n 1)"

            if [ -z "$markdown" ]; then
              url="$(printf '%s\n' "$output" | sed -n 's#.*\(https://vhs\.charm\.sh/[^ )]*\.gif\).*#\1#p' | head -n 1)"
              if [ -n "$url" ]; then
                markdown="![Made with VHS]($url)"
              fi
            fi

            if [ -z "$markdown" ]; then
              printf 'Could not find a VHS markdown image or GIF URL in publish output for %s.\n' "$file"
              printf '%s\n' "$output"
              return 1
            fi

            printf '%s\n' "$markdown"
          }

          help_markdown="$(publish_markdown demo/help.gif)"
          full_markdown="$(publish_markdown demo/full.gif)"
          cancel_markdown="$(publish_markdown demo/cancel.gif)"
          update_markdown="$(publish_markdown demo/update.gif)"
          features_markdown="$(publish_markdown demo/features.gif)"

          set_output help "$help_markdown"
          set_output full "$full_markdown"
          set_output cancel "$cancel_markdown"
          set_output update "$update_markdown"
          set_output features "$features_markdown"

      - name: Comment demo GIF preview on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        env:
          HELP_GIF: ${{ steps.publish-gifs.outputs.help }}
          FULL_GIF: ${{ steps.publish-gifs.outputs.full }}
          CANCEL_GIF: ${{ steps.publish-gifs.outputs.cancel }}
          UPDATE_GIF: ${{ steps.publish-gifs.outputs.update }}
          FEATURES_GIF: ${{ steps.publish-gifs.outputs.features }}
          ARTIFACT_URL: ${{ steps.upload-gifs.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- claude-cleaner-demo-gifs -->';
            const body = [
              marker,
              '## Latest terminal demo GIFs',
              '',
              'The newest generated terminal GIFs for this pull request are shown below:',
              '',
              '### Search, sort, filter, category',
              process.env.FEATURES_GIF,
              '',
              '### Help',
              process.env.HELP_GIF,
              '',
              '### Full cleanup flow',
              process.env.FULL_GIF,
              '',
              '### Cancel flow',
              process.env.CANCEL_GIF,
              '',
              '### Update flow',
              process.env.UPDATE_GIF,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      # On push to main: commit GIFs back to repo
      - name: Commit GIFs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo GIFs [skip ci]"
          file_pattern: demo/*.gif
