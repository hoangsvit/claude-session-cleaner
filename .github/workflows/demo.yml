name: Generate Demo GIFs

on:
  push:
    branches:
      - main
    paths:
      - "*.go"
      - demo/*.tape
      - demo/seed.js
  pull_request:
    paths:
      - "*.go"
      - demo/*.tape
      - demo/seed.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Render GIFs with VHS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg ttyd

      - name: Install VHS
        run: go install github.com/charmbracelet/vhs@latest

      - name: Download app dependencies
        run: go mod tidy

      - name: Build binary
        run: go build -o claude-cleaner .

      - name: Generate GIFs
        run: |
          vhs demo/help.tape
          vhs demo/full.tape
          vhs demo/cancel.tape

      # On PRs: upload as artifact for preview — cannot commit to fork branches
      - name: Upload GIFs as artifact (PR preview)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: demo-gifs
          path: demo/*.gif
          retention-days: 7

      # On push to main: commit GIFs back to repo
      - name: Commit GIFs
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo GIFs [skip ci]"
          file_pattern: demo/*.gif
