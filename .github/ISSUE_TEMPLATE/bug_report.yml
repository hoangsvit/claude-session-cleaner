name: Bug Report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `claude-cleaner --version`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: input
    id: arch
    attributes:
      label: Architecture
      placeholder: "amd64 / arm64"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Install method
      options:
        - npx
        - npm install -g
        - Binary download
        - go install
        - Built from source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `claude-cleaner`
        2. Select session 2
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or error messages
      render: text
